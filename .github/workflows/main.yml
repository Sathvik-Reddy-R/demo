name: Self Hosted Test

on: push

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Start server
        run: |
            Start-Process node -ArgumentList "server.js"
            Start-Sleep -Seconds 5

      - name: Test server
        run: Invoke-WebRequest http://localhost:3000
