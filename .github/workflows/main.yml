name: Build React App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted   # or use ubuntu-latest if you want GitHub runner

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Show files (debug)
      - name: Show project structure
        run: Get-ChildItem -Recurse

      # 3. Check Node version
      - name: Check Node version
        run: node -v

      # 4. Install dependencies
      - name: Install dependencies
        run: npm install

      # 5. Build React app
      - name: Build project
        run: npm run build

      # 6. Verify build folder exists
      - name: Verify build folder
        run: |
          if (Test-Path build) {
            echo "Build created successfully ✅"
          } else {
            echo "Build failed ❌"
            exit 1
          }

      # 7. Show build files
      - name: Show build contents
        run: Get-ChildItem build

      # 8. Success message
      - name: Done
        run: echo "CI build completed successfully 🚀"
