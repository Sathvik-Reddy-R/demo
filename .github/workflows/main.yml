name: Local Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Show files
        run: Get-ChildItem -Force

      - name: Node version
        run: node -v

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Success message
        run: echo "Workflow ran successfully 🚀"
